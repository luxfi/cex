syntax = "proto3";

package cex;

option go_package = "github.com/luxfi/cex/pkg/grpc/pb";

// CEX gRPC Service — regulated exchange with compliance pipeline.
// All order operations pass through pre-trade compliance checks,
// matching engine, and post-trade reporting (FINRA/ATS/MiFID).
service CEXService {
  // Order Management
  rpc SubmitOrder(SubmitOrderRequest) returns (SubmitOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc GetOrder(GetOrderRequest) returns (Order);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);

  // Market Data
  rpc ListMarkets(ListMarketsRequest) returns (ListMarketsResponse);
  rpc GetMarket(GetMarketRequest) returns (Market);
  rpc GetOrderBook(GetOrderBookRequest) returns (OrderBookSnapshot);
  rpc StreamOrderBook(StreamOrderBookRequest) returns (stream OrderBookUpdate);
  rpc StreamTrades(StreamTradesRequest) returns (stream Trade);

  // Account Management
  rpc GetAccountStatus(GetAccountStatusRequest) returns (AccountStatus);
  rpc RegisterAccount(RegisterAccountRequest) returns (AccountStatus);

  // Trades
  rpc ListTrades(ListTradesRequest) returns (ListTradesResponse);

  // Admin
  rpc HaltMarket(HaltMarketRequest) returns (HaltMarketResponse);
  rpc ResumeMarket(ResumeMarketRequest) returns (ResumeMarketResponse);

  // Health
  rpc Ping(PingRequest) returns (PingResponse);
}

// Enums

enum OrderType {
  ORDER_TYPE_LIMIT = 0;
  ORDER_TYPE_MARKET = 1;
  ORDER_TYPE_STOP = 2;
  ORDER_TYPE_STOP_LIMIT = 3;
}

enum OrderSide {
  ORDER_SIDE_BUY = 0;
  ORDER_SIDE_SELL = 1;
}

enum OrderStatus {
  ORDER_STATUS_NEW = 0;
  ORDER_STATUS_PENDING_APPROVAL = 1;
  ORDER_STATUS_OPEN = 2;
  ORDER_STATUS_PARTIAL_FILL = 3;
  ORDER_STATUS_FILLED = 4;
  ORDER_STATUS_CANCELLED = 5;
  ORDER_STATUS_REJECTED = 6;
  ORDER_STATUS_EXPIRED = 7;
  ORDER_STATUS_SUSPENDED = 8;
}

enum TimeInForce {
  TIME_IN_FORCE_DAY = 0;
  TIME_IN_FORCE_GTC = 1;
  TIME_IN_FORCE_IOC = 2;
  TIME_IN_FORCE_FOK = 3;
}

enum AssetClass {
  ASSET_CLASS_US_EQUITY = 0;
  ASSET_CLASS_CRYPTO = 1;
  ASSET_CLASS_FOREX = 2;
  ASSET_CLASS_OPTIONS = 3;
  ASSET_CLASS_FUTURES = 4;
  ASSET_CLASS_FIXED_INCOME = 5;
  ASSET_CLASS_REAL_ESTATE = 6;
  ASSET_CLASS_COMMODITIES = 7;
}

// Messages

message Order {
  string id = 1;
  string account_id = 2;
  string user_id = 3;
  string org_id = 4;
  string symbol = 5;
  AssetClass asset_class = 6;
  OrderSide side = 7;
  OrderType type = 8;
  TimeInForce time_in_force = 9;
  string qty = 10;
  string notional = 11;
  string limit_price = 12;
  string stop_price = 13;
  OrderStatus status = 14;
  string filled_qty = 15;
  string filled_avg_price = 16;
  string compliance_id = 17;
  string execution_venue = 18;
  bool reported_to_ats = 19;
  bool reported_finra = 20;
  int64 created_at = 21;
  int64 updated_at = 22;
  int64 filled_at = 23;
  int64 cancelled_at = 24;
}

message Trade {
  string id = 1;
  string order_id = 2;
  string account_id = 3;
  string symbol = 4;
  OrderSide side = 5;
  string price = 6;
  string qty = 7;
  string fee = 8;
  string venue = 9;
  int64 timestamp = 10;
  string trade_report_id = 11;
  string ats_report_id = 12;
}

message Market {
  string symbol = 1;
  AssetClass asset_class = 2;
  string base_currency = 3;
  string quote_currency = 4;
  string status = 5;
  string tick_size = 6;
  string lot_size = 7;
  string maker_fee = 8;
  string taker_fee = 9;
  bool tradable = 10;
  bool fractionable = 11;
  bool requires_kyc = 12;
  bool requires_accreditation = 13;
  string offering_type = 14;
  string issuer_id = 15;
  string issuer_name = 16;
}

message PriceLevel {
  int64 price = 1;
  int64 qty = 2;
  int32 order_count = 3;
}

message OrderBookSnapshot {
  string symbol = 1;
  repeated PriceLevel bids = 2;
  repeated PriceLevel asks = 3;
}

message OrderBookUpdate {
  string symbol = 1;
  repeated PriceLevel bid_updates = 2;
  repeated PriceLevel ask_updates = 3;
  int64 timestamp = 4;
}

message AccountStatus {
  string account_id = 1;
  int32 kyc_level = 2;
  bool aml_cleared = 3;
  bool accredited = 4;
  double max_order_size = 5;
  double daily_limit = 6;
}

// Request/Response messages

message SubmitOrderRequest {
  string account_id = 1;
  string user_id = 2;
  string org_id = 3;
  string symbol = 4;
  OrderSide side = 5;
  OrderType type = 6;
  TimeInForce time_in_force = 7;
  string qty = 8;
  string notional = 9;
  string limit_price = 10;
  string stop_price = 11;
  string client_order_id = 12;
}

message SubmitOrderResponse {
  Order order = 1;
}

message CancelOrderRequest {
  string order_id = 1;
}

message CancelOrderResponse {
  Order order = 1;
}

message GetOrderRequest {
  string order_id = 1;
}

message ListOrdersRequest {
  string account_id = 1;
}

message ListOrdersResponse {
  repeated Order orders = 1;
}

message ListMarketsRequest {}

message ListMarketsResponse {
  repeated Market markets = 1;
}

message GetMarketRequest {
  string symbol = 1;
}

message GetOrderBookRequest {
  string symbol = 1;
  int32 depth = 2;
}

message StreamOrderBookRequest {
  string symbol = 1;
  int32 depth = 2;
}

message StreamTradesRequest {
  string symbol = 1;
}

message GetAccountStatusRequest {
  string account_id = 1;
}

message RegisterAccountRequest {
  string account_id = 1;
  int32 kyc_level = 2;
  bool aml_cleared = 3;
  bool accredited = 4;
  double max_order_size = 5;
  double daily_limit = 6;
}

message ListTradesRequest {
  string account_id = 1;
}

message ListTradesResponse {
  repeated Trade trades = 1;
}

message HaltMarketRequest {
  string symbol = 1;
  string reason = 2;
}

message HaltMarketResponse {
  string status = 1;
  string symbol = 2;
}

message ResumeMarketRequest {
  string symbol = 1;
}

message ResumeMarketResponse {
  string status = 1;
  string symbol = 2;
}

message PingRequest {
  int64 timestamp = 1;
}

message PingResponse {
  int64 timestamp = 1;
  string service = 2;
}
